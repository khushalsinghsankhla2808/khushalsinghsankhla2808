<svg xmlns="http://www.w3.org/2000/svg"
     width="820" height="610"
     viewBox="0 0 820 610"
     role="img" aria-label="NeoFetch Terminal Info Card — Khushal Singh Sankhla">
  <defs>
    <!-- Card glass background gradient -->
    <linearGradient id="info-bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#121824" stop-opacity="0.97"/>
      <stop offset="100%" stop-color="#0a0d14" stop-opacity="0.98"/>
    </linearGradient>

    <!-- Animated neon border gradient -->
    <linearGradient id="border-glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffff">
        <animate attributeName="stop-color" values="#00ffff;#c084fc;#39d353;#ff8c00;#00ffff" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#c084fc">
        <animate attributeName="stop-color" values="#c084fc;#39d353;#ff8c00;#00ffff;#c084fc" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#39d353">
        <animate attributeName="stop-color" values="#39d353;#ff8c00;#00ffff;#c084fc;#39d353" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Title bar gradient -->
    <linearGradient id="info-titlebar-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#22272e"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>

    <!-- Outer drop shadow glow -->
    <filter id="info-card-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="blur"/>
      <feFlood flood-color="#c084fc" flood-opacity="0.25" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Scan-line texture -->
    <pattern id="info-scanlines" x="0" y="0" width="1" height="3" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="rgba(0,0,0,0.22)"/>
    </pattern>

    <!-- Text glow filter -->
    <filter id="text-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Name typing animation clipPath -->
    <clipPath id="name-clip">
      <rect x="30" y="50" width="0" height="30">
        <animate attributeName="width" from="0" to="340" dur="1.8s" fill="freeze" begin="0.2s"
                 calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
      </rect>
    </clipPath>
  </defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&amp;display=swap');
    
    .terminal-text {
      font-family: 'Fira Code', 'SF Mono', 'Courier New', Courier, monospace;
      font-size: 11px;
      fill: #e6edf3;
    }
    .name-title {
      font-family: 'Fira Code', 'SF Mono', 'Courier New', Courier, monospace;
      font-size: 18px;
      font-weight: 700;
      fill: #00ffff;
    }
    .subtitle {
      font-family: 'Fira Code', 'SF Mono', 'Courier New', Courier, monospace;
      font-size: 10px;
      fill: #8b949e;
    }
    .section-title {
      font-family: 'Fira Code', 'SF Mono', 'Courier New', Courier, monospace;
      font-size: 12px;
      font-weight: 700;
      fill: #ffd700;
      filter: url(#text-glow);
    }
    .label {
      font-weight: 700;
      fill: #ff8c00;
    }
    .project-link {
      text-decoration: none;
    }
    .project-title {
      font-weight: 700;
      fill: #58a6ff;
      cursor: pointer;
      transition: fill 0.2s, filter 0.2s;
    }
    .project-link:hover .project-title {
      fill: #00ffff;
      filter: url(#text-glow);
    }
    .banner-label {
      font-weight: 700;
      fill: #c084fc;
    }
  </style>
  <!-- Outer background and glass blur -->
  <rect x="2" y="2" width="816" height="606" rx="12"
        fill="url(#info-bg-grad)" stroke="url(#border-glow-grad)" stroke-width="2.5"
        filter="url(#info-card-shadow)"/>

  <!-- Title bar chrome -->
  <rect x="3" y="3" width="814" height="32" rx="9" fill="url(#info-titlebar-grad)"/>
  <rect x="3" y="25" width="814" height="10" fill="#161b22"/>
  <line x1="3" y1="35" x2="817" y2="35" stroke="#30363d" stroke-width="1" opacity="0.6"/>

  <!-- Window buttons -->
  <circle cx="20" cy="18" r="6" fill="#ff4444"/>
  <circle cx="40" cy="18" r="6" fill="#ffd700"/>
  <circle cx="60" cy="18" r="6" fill="#39d353"/>

  <!-- Title text -->
  <text x="410" y="22" class="terminal-text" fill="#8b949e" text-anchor="middle" font-size="11">
    neofetch — khushalsinghsankhla2808@github
  </text>
  <!-- ================= LEFT COLUMN ================= -->
  <!-- Header identity -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0s" dur="0.4s" fill="freeze"/>
    <text x="30" y="70" class="name-title" clip-path="url(#name-clip)">Khushal Singh Sankhla</text>
    <text x="30" y="92" class="subtitle">Data Analytics • Business Intelligence • AI Developer</text>
    <text x="30" y="110" class="terminal-text" fill="#8b949e">
      📂 github.com/khushalsinghsankhla2808
    </text>
    
    <!-- Typing cursor block -->
    <rect x="30" y="53" width="8" height="19" fill="#00ffff" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.01s" fill="freeze"/>
      <animate attributeName="x" from="30" to="260" begin="0.2s" dur="1.8s" fill="freeze"
               calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
      <animate attributeName="opacity" values="1;0;1" dur="0.8s" begin="2.0s" repeatCount="indefinite"/>
    </rect>
    
    <line x1="30" y1="125" x2="380" y2="125" stroke="#30363d" stroke-width="0.8" opacity="0.5"/>
  </g>
  <!-- System Info -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.4s" fill="freeze"/>
    <text x="30" y="150" class="section-title">╭─ 🖥️ System Information</text>
    
    <!-- OS -->
    <text x="40" y="174" class="terminal-text"><tspan class="label">OS      </tspan> GitHub • Linux 6.x</text>
    <!-- Shell -->
    <text x="40" y="194" class="terminal-text"><tspan class="label">Shell   </tspan> zsh + oh-my-zsh</text>
    <!-- Location -->
    <text x="40" y="214" class="terminal-text"><tspan class="label">Location</tspan> Jodhpur, Rajasthan, India</text>
    <!-- Status -->
    <text x="40" y="234" class="terminal-text"><tspan class="label">Status  </tspan>   Open to Data Analytics Opportunities</text>
    
    <!-- Pulsing Status Circle -->
    <g transform="translate(102, 230.5)">
      <circle cx="0" cy="0" r="4" fill="#39d353"/>
      <circle cx="0" cy="0" r="4" fill="none" stroke="#39d353" stroke-width="1.5">
        <animate attributeName="r" values="4;9;4" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
  <!-- About & Focus -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.4s" fill="freeze"/>
    <text x="30" y="270" class="section-title">╭─ 🎓 About &amp; Focus</text>
    
    <text x="40" y="294" class="terminal-text"><tspan class="label">Program </tspan> MCA @ JECRC University</text>
    <text x="40" y="314" class="terminal-text"><tspan class="label">CGPA    </tspan> 8.65 / 10</text>
    <text x="40" y="334" class="terminal-text"><tspan class="label">Focus On</tspan> • Data Analytics</text>
    <text x="98" y="354" class="terminal-text">• Business Intelligence</text>
    <text x="98" y="374" class="terminal-text">• SQL Development</text>
    <text x="98" y="394" class="terminal-text">• Data Engineering &amp; AI Applications</text>
  </g>
  <!-- Highlights -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.9s" dur="0.4s" fill="freeze"/>
    <text x="30" y="430" class="section-title">╭─ 🏆 Highlights</text>
    
    <text x="40" y="454" class="terminal-text" fill="#00ffff">★ CGPA 8.65 / 10</text>
    <text x="40" y="474" class="terminal-text" fill="#00ffff">★ 8+ Analytics &amp; AI Projects</text>
    <text x="40" y="494" class="terminal-text" fill="#00ffff">★ Microsoft Power BI Certified</text>
    <text x="40" y="514" class="terminal-text" fill="#00ffff">★ Microsoft Fabric Certified</text>
    <text x="40" y="534" class="terminal-text" fill="#00ffff">★ Cisco Data Analytics Certified</text>
  </g>
  <!-- ================= RIGHT COLUMN ================= -->
  <!-- Tech Stack -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.4s" fill="freeze"/>
    <text x="425" y="70" class="section-title">╭─ 🛠️ Tech Stack</text>
    
    <!-- Languages -->
    <text x="435" y="94" class="terminal-text">
      <tspan class="label">Languages: </tspan> 🐍 Python  🗄️ SQL  ⚛️ JS  ☕ Java  💻 C++
    </text>
    <!-- BI -->
    <text x="435" y="114" class="terminal-text">
      <tspan class="label">BI Tools:  </tspan> 📊 Power BI  📈 DAX  🔄 Query M  📦 Fabric
    </text>
    <!-- Databases -->
    <text x="435" y="134" class="terminal-text">
      <tspan class="label">Databases: </tspan> 🐘 PostgreSQL  🐬 MySQL  🍃 MongoDB
    </text>
    <!-- Analytics -->
    <text x="435" y="154" class="terminal-text">
      <tspan class="label">Analytics: </tspan> 🐼 Pandas  🔢 NumPy  📉 Matplotlib / Seaborn
    </text>
    <!-- Web -->
    <text x="435" y="174" class="terminal-text">
      <tspan class="label">Web:       </tspan> ⚛️ React  🟢 Node.js  ⚡ Express.js
    </text>
    <!-- Dev Tools -->
    <text x="435" y="194" class="terminal-text">
      <tspan class="label">Dev Tools: </tspan> 🔧 Git/GitHub  📝 VS Code  🛠️ Vercel / Render
    </text>
    <!-- AI Tools -->
    <text x="435" y="214" class="terminal-text">
      <tspan class="label">AI Tools:  </tspan> 🧠 Claude AI  ✨ Gemini Flash  🛸 Antigravity
    </text>
  </g>
  <!-- Featured Projects -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.8s" dur="0.4s" fill="freeze"/>
    <text x="425" y="250" class="section-title">╭─ 📂 Featured Projects</text>
    
    <!-- Project 1 -->
    <a href="https://github.com/khushalsinghsankhla2808/Velora-AI" target="_blank" class="project-link">
      <text x="435" y="274" class="terminal-text project-title">🚀 Velora AI</text>
    </a>
    <text x="445" y="290" class="terminal-text" fill="#8b949e">
      • MERN &amp; AI (Gemini/DeepSeek) Website Builder
    </text>

    <!-- Project 2 -->
    <a href="https://github.com/khushalsinghsankhla2808/Samsung-Supply-Chain" target="_blank" class="project-link">
      <text x="435" y="314" class="terminal-text project-title">📦 Samsung Supply Chain Dashboard</text>
    </a>
    <text x="445" y="330" class="terminal-text" fill="#8b949e">
      • Power BI Dashboard with Star Schema &amp; KPI Analytics
    </text>

    <!-- Project 3 -->
    <a href="https://github.com/khushalsinghsankhla2808/Spotify-Analytics" target="_blank" class="project-link">
      <text x="435" y="354" class="terminal-text project-title">🎵 Spotify Analytics Dashboard</text>
    </a>
    <text x="445" y="370" class="terminal-text" fill="#8b949e">
      • Music analytics using DAX &amp; Power Query M
    </text>

    <!-- Project 4 -->
    <a href="https://github.com/khushalsinghsankhla2808/Swiggy-vs-Zomato-SQL" target="_blank" class="project-link">
      <text x="435" y="394" class="terminal-text project-title">🍔 Swiggy vs Zomato SQL Analysis</text>
    </a>
    <text x="445" y="410" class="terminal-text" fill="#8b949e">
      • Advanced PostgreSQL analytics with Power BI
    </text>
  </g>
  <!-- Certifications -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="0.4s" fill="freeze"/>
    <text x="425" y="445" class="section-title">╭─ 🎓 Certifications</text>
    
    <text x="435" y="469" class="terminal-text">✓ Microsoft Power BI Certified (Microsoft Learn)</text>
    <text x="435" y="489" class="terminal-text">✓ Microsoft Fabric Environment (Microsoft Learn)</text>
    <text x="435" y="509" class="terminal-text">✓ Cisco Data Analytics Essentials (Cisco NetAcad)</text>
  </g>
  <!-- Bottom Banner / Footer -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.4s" fill="freeze"/>
    
    <line x1="30" y1="550" x2="790" y2="550" stroke="#30363d" stroke-width="0.8" opacity="0.5"/>
    
    <!-- Currently Building -->
    <text x="30" y="572" class="terminal-text">
      <tspan class="banner-label">Currently Building: </tspan>
      AI Analytics Platform • Interactive BI Dashboards • Data Engineering &amp; Open Source
    </text>
    
    <!-- Always Learning -->
    <text x="30" y="590" class="terminal-text">
      <tspan class="banner-label">Always Learning:    </tspan>
      Data Analytics • Business Intelligence • Machine Learning • Cloud Data • AI Dev
    </text>
  </g>
  <!-- Scanline texture overlay -->
  <rect x="3" y="3" width="814" height="604" rx="10" fill="url(#info-scanlines)" opacity="0.1" pointer-events="none"/>
</svg>