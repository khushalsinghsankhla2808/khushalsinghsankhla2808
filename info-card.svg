<svg xmlns="http://www.w3.org/2000/svg"
     width="650" height="400"
     viewBox="0 0 650 400"
     role="img" aria-label="NeoFetch Terminal Info Card — Khushal Singh Sankhla">
  <defs>
    <linearGradient id="info-bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#161b22" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0.98"/>
    </linearGradient>

    <linearGradient id="info-titlebar-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#2d333b"/>
      <stop offset="100%" stop-color="#22272e"/>
    </linearGradient>

    <filter id="info-card-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#c084fc" flood-opacity="0.15" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="info-scanlines" x="0" y="0" width="1" height="3" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="rgba(0,0,0,0.18)"/>
    </pattern>
  </defs>
  <!-- Outer background and border -->
  <rect x="2" y="2" width="646" height="396" rx="12"
        fill="url(#info-bg-grad)" stroke="#30363d" stroke-width="1.2"
        filter="url(#info-card-shadow)"/>

  <!-- Title bar -->
  <path d="M 2 14 A 12 12 0 0 1 14 2 L 636 2 A 12 12 0 0 1 648 14 L 648 36 L 2 36 Z" fill="url(#info-titlebar-grad)"/>
  <line x1="2" y1="36" x2="648" y2="36" stroke="#30363d" stroke-width="1" opacity="0.6"/>

  <!-- Window control buttons -->
  <circle cx="18" cy="19" r="5" fill="#ff4444"/>
  <circle cx="32" cy="19" r="5" fill="#ffd700"/>
  <circle cx="46" cy="19" r="5" fill="#39d353"/>

